version: '3.9'

services:
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    ports:
      - "38765:38765"
    volumes:
      - ./data:/data
    env_file:
      - .env
    environment:
      - ZHIKU_KNOWLEDGE_BASE_DIR=/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:38765/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

